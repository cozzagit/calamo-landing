# /etc/nginx/sites-available/calamo.vibecanyon.com
#
# Landing statica Next.js export su /var/www/calamo-landing/out
# + API Express (PM2) su localhost:3060.
#
# Installa con:
#   sudo ln -s /etc/nginx/sites-available/calamo.vibecanyon.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cert TLS: gestito da certbot
#   sudo certbot --nginx -d calamo.vibecanyon.com

server {
    listen 80;
    listen [::]:80;
    server_name calamo.vibecanyon.com;

    # Redirect HTTP -> HTTPS (sostituito poi da certbot)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name calamo.vibecanyon.com;

    # Cert paths popolati da certbot
    # ssl_certificate /etc/letsencrypt/live/calamo.vibecanyon.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/calamo.vibecanyon.com/privkey.pem;

    root /var/www/calamo-landing/out;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/css
        text/javascript
        text/html
        text/plain
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # API microservice -> Express su localhost:3060
    location /api/ {
        proxy_pass http://127.0.0.1:3060/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # Caching aggressivo per asset Next.js hashed
    location /_next/static/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback (Next.js export non ne ha veramente bisogno ma non costa nulla)
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Vietiamo accesso a file nascosti
    location ~ /\.(?!well-known) {
        deny all;
    }
}
